<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="#1a1a2e"/>
  
  <!-- Left icon section with stars -->
  <g>
    <!-- Star constellation circle -->
    <circle cx="150" cy="150" r="8" fill="#e8d4a0" opacity="0.6"/>
    <circle cx="200" cy="100" r="5" fill="#e8d4a0" opacity="0.5"/>
    <circle cx="220" cy="150" r="6" fill="#e8d4a0" opacity="0.6"/>
    <circle cx="200" cy="200" r="5" fill="#e8d4a0" opacity="0.5"/>
    <circle cx="100" cy="100" r="5" fill="#e8d4a0" opacity="0.5"/>
    <circle cx="80" cy="150" r="6" fill="#e8d4a0" opacity="0.6"/>
    <circle cx="100" cy="200" r="5" fill="#e8d4a0" opacity="0.5"/>
    
    <!-- Simplified sax -->
    <g transform="translate(110, 100)">
      <!-- Bell -->
      <ellipse cx="40" cy="70" rx="30" ry="25" fill="none" stroke="#c9a961" stroke-width="5"/>
      <ellipse cx="40" cy="70" rx="20" ry="15" fill="none" stroke="#e8d4a0" stroke-width="2"/>
      
      <!-- Body curve -->
      <path d="M 40 45 Q 25 20, 30 -5" 
            fill="none" stroke="#c9a961" stroke-width="6" stroke-linecap="round"/>
      <path d="M 40 45 Q 25 20, 30 -5" 
            fill="none" stroke="#e8d4a0" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Notes flowing -->
      <circle cx="70" cy="60" r="4" fill="#e8d4a0" opacity="0.8"/>
      <circle cx="85" cy="55" r="3" fill="#e8d4a0" opacity="0.6"/>
      <circle cx="75" cy="75" r="3" fill="#c9a961" opacity="0.7"/>
    </g>
  </g>
  
  <!-- Main text in cursive -->
  <g>
    <text x="300" y="170" font-family="cursive, 'Dancing Script', 'Brush Script MT', fantasy" font-size="72" font-weight="400" fill="#e8d4a0" font-style="italic">
      tito dreaming with me
    </text>
    
    <text x="300" y="210" font-family="sans-serif" font-size="18" font-weight="300" fill="#c9a961" letter-spacing="4">
      HEALING THROUGH MUSIC · CREATING THROUGH FEELING
    </text>
  </g>
  
  <!-- Decorative wave line -->
  <path d="M 300 240 Q 500 230, 700 240 Q 900 250, 1050 240" 
        stroke="#c9a961" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Small stars scattered right side -->
  <circle cx="950" cy="100" r="3" fill="#e8d4a0" opacity="0.5"/>
  <circle cx="1020" cy="130" r="4" fill="#e8d4a0" opacity="0.6"/>
  <circle cx="1100" cy="110" r="3" fill="#e8d4a0" opacity="0.5"/>
  <circle cx="980" cy="180" r="3" fill="#c9a961" opacity="0.5"/>
  <circle cx="1070" cy="190" r="4" fill="#c9a961" opacity="0.6"/>
</svg>