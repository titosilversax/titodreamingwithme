<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="250" cy="250" r="250" fill="#1a1a2e"/>
  
  <!-- Outer star ring (simplified) -->
  <g opacity="0.5">
    <circle cx="250" cy="80" r="4" fill="#e8d4a0"/>
    <circle cx="370" cy="130" r="3" fill="#e8d4a0"/>
    <circle cx="420" cy="250" r="4" fill="#e8d4a0"/>
    <circle cx="370" cy="370" r="3" fill="#e8d4a0"/>
    <circle cx="250" cy="420" r="4" fill="#e8d4a0"/>
    <circle cx="130" cy="370" r="3" fill="#e8d4a0"/>
    <circle cx="80" cy="250" r="4" fill="#e8d4a0"/>
    <circle cx="130" cy="130" r="3" fill="#e8d4a0"/>
  </g>
  
  <!-- Stylized sax icon -->
  <g transform="translate(200, 150)">
    <!-- Bell -->
    <ellipse cx="50" cy="150" rx="40" ry="35" fill="none" stroke="#c9a961" stroke-width="6"/>
    <ellipse cx="50" cy="150" rx="28" ry="23" fill="none" stroke="#e8d4a0" stroke-width="3"/>
    
    <!-- Body -->
    <path d="M 50 115 Q 32 80, 28 45 Q 27 20, 38 5" 
          fill="none" stroke="#c9a961" stroke-width="8" stroke-linecap="round"/>
    <path d="M 50 115 Q 32 80, 28 45 Q 27 20, 38 5" 
          fill="none" stroke="#e8d4a0" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Musical notes as stars -->
    <circle cx="90" cy="130" r="5" fill="#e8d4a0"/>
    <circle cx="110" cy="120" r="4" fill="#e8d4a0" opacity="0.7"/>
    <circle cx="100" cy="150" r="4" fill="#c9a961" opacity="0.8"/>
  </g>
  
  <!-- Cursive text mark below -->
  <text x="250" y="395" font-family="cursive, 'Dancing Script', 'Brush Script MT', fantasy" font-size="32" font-weight="400" fill="#e8d4a0" text-anchor="middle" font-style="italic">
    tito dreaming
  </text>
  <text x="250" y="435" font-family="cursive, 'Dancing Script', 'Brush Script MT', fantasy" font-size="32" font-weight="400" fill="#e8d4a0" text-anchor="middle" font-style="italic">
    with me
  </text>
</svg>